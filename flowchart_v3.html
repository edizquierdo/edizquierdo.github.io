<style>
:root {
  --bg:       #050912;
  --glass:    rgba(8,15,30,0.94);
  --border:   rgba(80,160,255,0.14);
  --text:     #c8dcf5;
  --dim:      rgba(140,175,220,0.48);
  --btn:      rgba(11,20,38,0.9);
  --btnbr:    rgba(80,160,255,0.17);
  --hover:    rgba(80,140,255,0.16);
  --abg:      rgba(34,211,238,0.11);
  --abr:      rgba(34,211,238,0.44);
  --acol:     #22d3ee;
}
[data-theme="light"] {
  --bg:       #edf2f9;
  --glass:    rgba(248,251,255,0.97);
  --border:   rgba(100,140,210,0.2);
  --text:     #1c2d4a;
  --dim:      rgba(70,100,145,0.58);
  --btn:      rgba(255,255,255,0.96);
  --btnbr:    rgba(100,140,210,0.22);
  --hover:    rgba(100,140,210,0.1);
  --abg:      rgba(0,155,180,0.09);
  --abr:      rgba(0,155,180,0.42);
  --acol:     #007a8c;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Open Sans',sans-serif;transition:background .3s,color .3s;}

/* ── Header ── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:300;height:50px;padding:0 16px;
  background:var(--glass);border-bottom:1px solid var(--border);
  backdrop-filter:blur(14px);display:flex;align-items:center;gap:12px;
  transition:background .3s,border-color .3s;
}
#title h1{font-family:'Open Sans',sans-serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--acol);line-height:1.3;font-weight:700;}
#title p{font-size:9.5px;color:var(--dim);}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}

/* ── Tabs ── */
.tabs{display:flex;gap:3px;}
.tab{
  padding:4px 12px;font-family:'Open Sans',sans-serif;font-size:9.5px;letter-spacing:.03em;
  background:var(--btn);border:1px solid var(--btnbr);border-radius:4px;
  color:var(--dim);cursor:pointer;user-select:none;transition:all .18s;
}
.tab:hover{background:var(--hover);color:var(--text);}
.tab.on{background:var(--abg);border-color:var(--abr);color:var(--acol);}

/* ── Legend ── */
#legend-wrap{display:flex;align-items:center;gap:11px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--dim);cursor:pointer;user-select:none;transition:color .18s,opacity .18s;}
.leg:hover{color:var(--text);}
.leg.off{opacity:.28;}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.leg-static{display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--dim);user-select:none;}
.leg-line{width:20px;height:2.5px;border-radius:2px;flex-shrink:0;}

/* ── Theme btn ── */
#tbtn{
  margin-left:auto;flex-shrink:0;width:30px;height:30px;
  background:var(--btn);border:1px solid var(--btnbr);border-radius:6px;
  cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;
  color:var(--text);transition:all .18s;
}
#tbtn:hover{background:var(--hover);}

/* ── Zoom controls ── */
#zctrl{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:5px;}
.zc{
  width:30px;height:30px;background:var(--glass);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(8px);transition:all .18s;
}
.zc:hover{background:var(--hover);}

/* ── Info panel ── */
#info{
  position:fixed;bottom:20px;left:20px;z-index:200;width:248px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:10px;padding:13px 14px;pointer-events:none;
  opacity:0;transform:translateY(10px);transition:opacity .18s,transform .18s;
  backdrop-filter:blur(12px);
}
#info.show{opacity:1;transform:translateY(0);}
#i-id{font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;margin-bottom:2px;}
#i-name{font-size:12.5px;font-weight:600;margin-bottom:4px;}
#i-badge-wrap{margin-bottom:5px;}
.i-badge{display:inline-block;font-size:8.5px;font-family:'Open Sans',sans-serif;padding:2px 7px;border-radius:3px;}
#i-credits{font-size:9.5px;color:var(--dim);margin-bottom:5px;}
#i-desc{font-size:10.5px;color:var(--dim);line-height:1.55;margin-bottom:8px;}
.i-sec{font-size:8.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:4px;}
.i-tags{display:flex;flex-wrap:wrap;gap:4px;}
.i-tag{font-size:8.5px;font-family:'Open Sans',sans-serif;padding:2px 6px;border-radius:3px;background:rgba(80,140,255,.07);border:1px solid rgba(80,140,255,.2);}

/* ── Hint ── */
#hint{position:fixed;top:58px;left:50%;transform:translateX(-50%);font-size:9.5px;color:var(--dim);z-index:100;pointer-events:none;transition:opacity .6s;white-space:nowrap;}

/* ── Claude badge ── */
#claude-badge{
  position:fixed;bottom:20px;right:64px;z-index:200;
  display:flex;align-items:center;gap:7px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:8px;padding:6px 11px;
  backdrop-filter:blur(8px);
  font-size:9px;color:var(--dim);
  text-decoration:none;
  white-space:nowrap;
}
#claude-badge .cl-icon{flex-shrink:0;}

svg#svg{display:block;position:fixed;top:50px;left:0;right:0;bottom:0;}
</style>
</head>

['ECE461','ECE462',['cpe','ee']],
]; 

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let major = 'both';
let dark  = true;
let muted = new Set();        // muted categories (only relevant in single-major mode)
let zoomB = null;
let initT = null;

const cmap = {};
COURSES.forEach(c => cmap[c.id] = c);

/* ══════════════════════════════════════════
   FILTER HELPERS
══════════════════════════════════════════ */
function getCourses(){
  return COURSES.filter(c => major==='both' || c.m.includes(major));
}
function getEdges(cset){
  return EDGES.filter(([s,t,ms]) =>
    (major==='both' || ms.includes(major)) && cset.has(s) && cset.has(t)
  );
}

/* ══════════════════════════════════════════
   LAYOUT (longest-path levels + barycentric)
══════════════════════════════════════════ */
const NW=132, NH=52, HG=20, VG=72;
const MAR={t:30, l:30, r:30, b:40};

function layout(courses, edges){
  const ids = new Set(courses.map(c=>c.id));
  const ch={}, pa={};
  courses.forEach(c=>{ ch[c.id]=[]; pa[c.id]=[]; });
  edges.forEach(([s,t])=>{ if(ids.has(s)&&ids.has(t)){ch[s].push(t); pa[t].push(s);} });

  // Kahn + longest path leveling
  const lv={}, deg={};
  courses.forEach(c=>{ lv[c.id]=0; deg[c.id]=pa[c.id].length; });
  const q = courses.filter(c=>deg[c.id]===0).map(c=>c.id);
  while(q.length){
    const n=q.shift();
    ch[n].forEach(c=>{ lv[c]=Math.max(lv[c],lv[n]+1); if(--deg[c]===0) q.push(c); });
  }

  const maxL = Math.max(...courses.map(c=>lv[c.id]));
  const rows = Array.from({length:maxL+1}, ()=>[]);
  courses.forEach(c=>rows[lv[c.id]].push(c.id));

  // Barycentric crossing reduction (9 passes)
  const pos={};
  rows.forEach((r,i)=>r.forEach((id,j)=>pos[id]=j));
  const avgP=id=>{ const pp=pa[id]; return pp.length?pp.reduce((s,p)=>s+pos[p],0)/pp.length:pos[id]; };
  const avgC=id=>{ const cc=ch[id]; return cc.length?cc.reduce((s,c)=>s+pos[c],0)/cc.length:pos[id]; };
  for(let p=0;p<9;p++){
    rows.forEach((r,i)=>{ if(i>0){r.sort((a,b)=>avgP(a)-avgP(b)); r.forEach((id,j)=>pos[id]=j);} });
    for(let i=maxL-1;i>=0;i--){ rows[i].sort((a,b)=>avgC(a)-avgC(b)); rows[i].forEach((id,j)=>pos[id]=j); }
  }

  const rw = r => r.length*NW + (r.length-1)*HG;
  const W = Math.max(...rows.map(rw)) + MAR.l + MAR.r + 30;
  const H = (maxL+1)*(NH+VG) + MAR.t + MAR.b;

  const np={};
  rows.forEach((r,li)=>{
    const sx = (W - rw(r))/2;
    r.forEach((id,j)=>{ np[id]={ x:sx+j*(NW+HG), y:MAR.t+li*(NH+VG) }; });
  });
  return {np, W, H, ch, pa};
}

/* ══════════════════════════════════════════
   LEGEND
══════════════════════════════════════════ */
function updateLegend(){
  const wrap = document.getElementById('legend-wrap');
  wrap.innerHTML = '';

  if(major === 'both'){
    // Show major-color legend (informational, no click)
    ['shared','ee','cpe'].forEach(key=>{
      const col = MAJ_COL[key];
      const d = document.createElement('div');
      d.className = 'leg-static';
      d.innerHTML = `<div class="leg-line" style="background:${col}"></div>${MAJOR_LABELS[key]}`;
      wrap.appendChild(d);
    });
  } else {
    // Show category legend with filter clicks
    ['math','phys','ece','cs','design'].forEach(cat=>{
      const col = CAT_COL[cat];
      const d = document.createElement('div');
      d.className = 'leg' + (muted.has(cat)?' off':'');
      d.dataset.cat = cat;
      d.innerHTML = `<div class="leg-dot" style="background:${col}"></div>${CAT_LABELS[cat]}`;
      d.onclick = ()=>toggleCat(cat);
      wrap.appendChild(d);
    });
  }
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function render(preserve=false){
  let savedT = null;
  if(preserve && zoomB) savedT = d3.zoomTransform(document.getElementById('svg'));

  const courses = getCourses();
  const cset    = new Set(courses.map(c=>c.id));
  const edges   = getEdges(cset);
  const {np,W,H,ch,pa} = layout(courses,edges);

  // Clear & resize SVG
  const svgEl = document.getElementById('svg');
  svgEl.innerHTML = '';

  const sv = d3.select('#svg')
    .attr('viewBox',`0 0 ${W} ${H}`)
    .style('background', dark?'#050912':'#edf2f9');

  // Defs: arrowhead markers
  const defs = sv.append('defs');
  // Category markers (for single-major mode highlight)
  Object.entries(CAT_COL).forEach(([cat,col])=>{
    defs.append('marker').attr('id',`ar-${cat}`)
      .attr('viewBox','0 -4 8 8').attr('refX',7).attr('refY',0)
      .attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
      .append('path').attr('d','M0,-4L8,0L0,4').attr('fill',col);
  });
  // Major markers (for both-mode highlight)
  Object.entries(MAJ_COL).forEach(([key,col])=>{
    defs.append('marker').attr('id',`ar-maj-${key}`)
      .attr('viewBox','0 -4 8 8').attr('refX',7).attr('refY',0)
      .attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
      .append('path').attr('d','M0,-4L8,0L0,4').attr('fill',col);
  });
  // Dim marker
  defs.append('marker').attr('id','ar-dim')
    .attr('viewBox','0 -4 8 8').attr('refX',7).attr('refY',0)
    .attr('markerWidth',4).attr('markerHeight',4).attr('orient','auto')
    .append('path').attr('d','M0,-4L8,0L0,4')
    .attr('fill', dark?'rgba(80,140,220,.50)':'rgba(90,120,190,.48)');

  // Zoom group
  const g = sv.append('g');
  zoomB = d3.zoom().scaleExtent([0.08,4])
    .on('zoom', e=>g.attr('transform',e.transform));
  sv.call(zoomB);

  const sc = Math.min(window.innerWidth/W, (window.innerHeight-50)/H) * 0.86;
  const tx = (window.innerWidth  - W*sc)/2;
  const ty = (window.innerHeight - 50 - H*sc)/2;
  initT = d3.zoomIdentity.translate(tx,ty).scale(sc);
  sv.call(zoomB.transform, preserve&&savedT ? savedT : initT);

  // ── Edges ──────────────────────────────────────
  const bStroke = dark?'rgba(80,140,220,.42)':'rgba(90,120,190,.40)';

  // In "both" mode edges are colored by major; in single mode they're dim base
  const edgeBaseColor = e => {
    if(major !== 'both') return bStroke;
    const col = MAJ_COL[edgeMajKey(e[2])];
    // semi-transparent version
    return col + '55';
  };

  const eG = g.append('g');
  const eSel = eG.selectAll('path').data(edges).join('path')
    .attr('fill','none')
    .attr('stroke', e => edgeBaseColor(e))
    .attr('stroke-width', 1.8)
    .attr('marker-end', e => {
      if(major==='both') return `url(#ar-maj-${edgeMajKey(e[2])})`;
      return 'url(#ar-dim)';
    })
    .attr('d', ([s,t]) => {
      const p=np[s], q=np[t]; if(!p||!q) return '';
      const x1=p.x+NW/2, y1=p.y+NH, x2=q.x+NW/2, y2=q.y, dy=y2-y1;
      return `M${x1},${y1} C${x1},${y1+dy*.44} ${x2},${y2-dy*.44} ${x2},${y2}`;
    });

  // ── Nodes ─────────────────────────────────────
  const nSel = g.append('g').selectAll('g').data(courses).join('g')
    .attr('transform', d=>{ const p=np[d.id]; return p?`translate(${p.x},${p.y})`:'translate(-9999,-9999)'; })
    .style('cursor','pointer');

  // Determine node stroke/fill
  const nodeStroke = d => major==='both' ? MAJ_COL[majKey(d.m)] : CAT_COL[d.cat];
  const nodeFill   = d => major==='both' ? majBg(majKey(d.m),dark) : catBg(d.cat,dark);

  nSel.append('rect')
    .attr('width',NW).attr('height',NH).attr('rx',6).attr('ry',6)
    .attr('fill',  d=>nodeFill(d))
    .attr('stroke',d=>nodeStroke(d))
    .attr('stroke-width', 2);

  nSel.append('text')
    .attr('x',NW/2).attr('y',28).attr('text-anchor','middle')
    .attr('font-family','Open Sans,sans-serif').attr('font-size','20px').attr('font-weight','700')
    .attr('fill',d=>nodeStroke(d)).attr('pointer-events','none')
    .text(d=>d.id);

  nSel.append('text')
    .attr('x',NW/2).attr('y',44).attr('text-anchor','middle')
    .attr('font-family','Open Sans,sans-serif').attr('font-size','8.5px')
    .attr('fill',dark?'rgba(255,255,255,.58)':'rgba(20,40,80,.62)')
    .attr('pointer-events','none')
    .text(d=>d.name);

  // Category visibility (single-major mode only)
  function applyVis(){
    if(major==='both'){ nSel.style('display',''); eSel.style('display',''); return; }
    nSel.style('display',d=>muted.has(d.cat)?'none':'');
    eSel.style('display',([s,t])=>
      muted.has(cmap[s]?.cat)||muted.has(cmap[t]?.cat)?'none':'');
  }
  applyVis();

  // ── Hover interactions ─────────────────────────
  function ancestors(id){
    const v=new Set(), q=[id];
    while(q.length){ const c=q.shift(); (pa[c]||[]).forEach(p=>{if(!v.has(p)){v.add(p);q.push(p);}}); }
    return v;
  }
  function descendants(id){
    const v=new Set(), q=[id];
    while(q.length){ const c=q.shift(); (ch[c]||[]).forEach(x=>{if(!v.has(x)){v.add(x);q.push(x);}}); }
    return v;
  }

  nSel.on('mouseenter', function(_,d){
    if(major!=='both' && muted.has(d.cat)) return;
    const AN=ancestors(d.id), DE=descendants(d.id);
    nSel.attr('opacity', n=>(n.id===d.id||AN.has(n.id)||DE.has(n.id)) ? 1 : .08);

    eSel.attr('stroke', ([s,t,ms])=>{
      const isA = (AN.has(s)||s===d.id) && (AN.has(t)||t===d.id);
      const isD = (s===d.id||DE.has(s)) && DE.has(t);
      if(isA||isD){
        return major==='both' ? MAJ_COL[edgeMajKey(ms)] : CAT_COL[cmap[t]?.cat||'ece'];
      }
      return dark?'rgba(80,140,220,.03)':'rgba(90,120,190,.03)';
    })
    .attr('stroke-width', ([s,t])=>{
      const isA=(AN.has(s)||s===d.id)&&(AN.has(t)||t===d.id);
      const isD=(s===d.id||DE.has(s))&&DE.has(t);
      return (isA||isD)?3:1.8;
    })
    .attr('marker-end', ([s,t,ms])=>{
      const isA=(AN.has(s)||s===d.id)&&(AN.has(t)||t===d.id);
      const isD=(s===d.id||DE.has(s))&&DE.has(t);
      if(isA||isD){
        return major==='both'
          ? `url(#ar-maj-${edgeMajKey(ms)})`
          : `url(#ar-${cmap[t]?.cat||'ece'})`;
      }
      return 'url(#ar-dim)';
    });

    // Info panel
    document.getElementById('i-id').textContent    = d.id;
    document.getElementById('i-id').style.color    = nodeStroke(d);
    document.getElementById('i-name').textContent  = d.name;
    document.getElementById('i-credits').textContent = `${d.cr} credit hours`;
    document.getElementById('i-desc').textContent  = d.desc;

    const bw = document.getElementById('i-badge-wrap');
    bw.innerHTML = '';
    if(major==='both'){
      const mk = majKey(d.m);
      if(mk !== 'shared'){
        const bc = MAJ_COL[mk];
        const sp = document.createElement('div');
        sp.className='i-badge';
        sp.textContent = (mk==='ee'?'EE':'CpE') + ' Only';
        sp.style.cssText=`background:${bc}22;border:1px solid ${bc}66;color:${bc}`;
        bw.appendChild(sp);
      }
    }

    const pre = pa[d.id]||[];
    const pw = document.getElementById('i-pre-wrap');
    const pt = document.getElementById('i-prereqs');
    pt.innerHTML='';
    if(pre.length){
      pw.style.display='block';
      pre.forEach(pid=>{
        const t=document.createElement('div'); t.className='i-tag'; t.textContent=pid;
        const pc=cmap[pid]?.cat||'ece';
        if(major==='both'){
          const mk=majKey(cmap[pid]?.m||['cpe','ee']);
          t.style.borderColor=MAJ_COL[mk]+'55'; t.style.color=MAJ_COL[mk];
        } else {
          t.style.borderColor=CAT_COL[pc]+'55'; t.style.color=CAT_COL[pc];
        }
        pt.appendChild(t);
      });
    } else { pw.style.display='none'; }

    document.getElementById('info').classList.add('show');
  })
  .on('mouseleave', ()=>{
    nSel.attr('opacity',1);
    eSel.attr('stroke',e=>edgeBaseColor(e))
        .attr('stroke-width',1.8)
        .attr('marker-end',e=>major==='both'?`url(#ar-maj-${edgeMajKey(e[2])})`:'url(#ar-dim)');
    applyVis();
    document.getElementById('info').classList.remove('show');
  });
}

/* ══════════════════════════════════════════
   CONTROLS
══════════════════════════════════════════ */
function setMajor(m){
  major=m;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['both','cpe','ee'][i]===m));
  if(m!=='both') muted.clear();  // reset category filters when switching to single mode
  updateLegend();
  render(false);
}
function toggleTheme(){
  dark=!dark;
  setThemePalette();
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('tbtn').textContent=dark?'🌙':'☀️';
  updateLegend();
  render(true);
}
function toggleCat(cat){
  muted.has(cat)?muted.delete(cat):muted.add(cat);
  document.querySelector(`.leg[data-cat="${cat}"]`)?.classList.toggle('off',muted.has(cat));
  render(true);
}
function zoomBy(k){ if(zoomB) d3.select('#svg').transition().duration(250).call(zoomB.scaleBy,k); }
function resetView(){ if(zoomB&&initT) d3.select('#svg').transition().duration(380).call(zoomB.transform,initT); }

window.setMajor=setMajor; window.toggleTheme=toggleTheme;
window.toggleCat=toggleCat; window.zoomBy=zoomBy; window.resetView=resetView;

// ── Boot ──
setThemePalette();
updateLegend();
render();
setTimeout(()=>{ const h=document.getElementById('hint'); if(h)h.style.opacity='0'; }, 3800);
</script>
